name: Exploring Variables and Secrets

on:
    push

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - name: Docker Build
      
      run: echo docker build -t ${{ env.CONTAINER_REGISTRY }}/${{ vars.DOCKER_USERNAME }}/my-repo:latest
      
    - name: Docker login
      run: docker login --username=${{ vars.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }}

    - name: Docker Publish
      run: docker push $CONTAINER_REGISTRY/${{ vars.DOCKER_USERNAME }}/my-repo:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
    - name: Docker Run
      run: docker run -d -p 8080:80 ${{ env.CONTAINER_REGISTRY }}/${{ vars.DOCKER_USERNAME }}/my-repo:latest